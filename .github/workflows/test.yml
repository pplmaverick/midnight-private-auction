name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Verify compiled contract artifacts exist
        run: |
          test -d contract/src/managed/auction/keys || \
            (echo "Compiled contract artifacts missing — run 'npm run compile' locally" && exit 1)
          test -f contract/src/managed/auction/compiler/contract-info.json || \
            (echo "contract-info.json missing" && exit 1)
          echo "Contract artifacts present"
