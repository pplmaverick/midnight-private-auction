<svg width="100%" viewBox="0 0 680 640" role="img">
<title>Midnight Private Auction — Architecture Diagram v3</title>
<desc>Two-phase ZK auction flow with corrected persistentHash parameters and sk privacy annotation.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #3C3489; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text { fill: #085041; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text { fill: #712B13; }
  @media (prefers-color-scheme: dark) {
    .c-purple rect { fill: #26215C; stroke: #AFA9EC; }
    .c-purple text { fill: #CECBF6; }
    .c-teal rect { fill: #04342C; stroke: #5DCAA5; }
    .c-teal text { fill: #9FE1CB; }
    .c-coral rect { fill: #4A1B0C; stroke: #F0997B; }
    .c-coral text { fill: #F5C4B3; }
  }
  .th { font-size: 14px; font-weight: 500; font-family: sans-serif; }
  .ts { font-size: 12px; font-family: sans-serif; }
</style>

<text class="th" x="40" y="36" style="font-size:11px;letter-spacing:0.08em;opacity:0.5">BIDDING PHASE</text>
<line x1="40" y1="42" x2="640" y2="42" stroke="#555" stroke-width="0.5"/>
<g class="c-purple">
  <rect x="40" y="56" width="220" height="140" rx="10" stroke-width="0.5"/>
  <text class="th" x="150" y="80" text-anchor="middle">Bidder — private state</text>
  <text class="ts" x="150" y="100" text-anchor="middle" style="opacity:0.7">Never leaves device</text>
  <rect x="60" y="112" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="128" text-anchor="middle">secretKey (sk)</text>
  <rect x="60" y="141" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="157" text-anchor="middle">bidAmount</text>
  <rect x="60" y="170" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="186" text-anchor="middle">bidSalt</text>
</g>
<line x1="262" y1="126" x2="338" y2="126" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="270" y="108" width="62" height="36" rx="6" fill="#2a1f5a" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="301" y="124" text-anchor="middle" style="fill:#AFA9EC">ZK</text>
<text class="ts" x="301" y="137" text-anchor="middle" style="fill:#AFA9EC">proof</text>
<g class="c-teal">
  <rect x="340" y="56" width="300" height="140" rx="10" stroke-width="0.5"/>
  <text class="th" x="490" y="80" text-anchor="middle">Midnight ledger</text>
  <text class="ts" x="490" y="100" text-anchor="middle" style="opacity:0.7">Public on-chain state</text>
  <rect x="358" y="112" width="264" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="490" y="128" text-anchor="middle">sealedBids[auctionId][bidderPK]</text>
  <rect x="358" y="141" width="264" height="40" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="490" y="157" text-anchor="middle">= persistentHash(</text>
  <text class="ts" x="490" y="172" text-anchor="middle">"auction:seal:", sk, auctionId, amt, salt)</text>
</g>
<rect x="340" y="208" width="300" height="42" rx="6" fill="none" stroke="#555" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="490" y="225" text-anchor="middle" style="fill:#888">Chain observers see: bidderPK + 32-byte hash</text>
<text class="ts" x="490" y="241" text-anchor="middle" style="fill:#888">Cannot see: amount · salt · secretKey</text>
<line x1="40" y1="270" x2="640" y2="270" stroke="#555" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="th" x="40" y="291" style="font-size:11px;letter-spacing:0.08em;opacity:0.5">REVEAL PHASE  —  after closeAuction()</text>
<line x1="40" y1="297" x2="640" y2="297" stroke="#555" stroke-width="0.5"/>
<g class="c-coral">
  <rect x="40" y="312" width="220" height="100" rx="10" stroke-width="0.5"/>
  <text class="th" x="150" y="336" text-anchor="middle">Bidder discloses</text>
  <rect x="60" y="350" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="366" text-anchor="middle">amount = 200 DUST</text>
  <rect x="60" y="379" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="395" text-anchor="middle">salt = 0xabc...</text>
</g>
<line x1="262" y1="362" x2="338" y2="362" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="268" y="344" width="66" height="36" rx="6" fill="#3a1508" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="301" y="360" text-anchor="middle" style="fill:#F0997B">ZK</text>
<text class="ts" x="301" y="373" text-anchor="middle" style="fill:#F0997B">verify</text>
<g class="c-teal">
  <rect x="340" y="312" width="300" height="178" rx="10" stroke-width="0.5"/>
  <text class="th" x="490" y="336" text-anchor="middle">Midnight ledger verifies</text>
  <rect x="358" y="350" width="264" height="40" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="490" y="366" text-anchor="middle">assert persistentHash("auction:seal:",</text>
  <text class="ts" x="490" y="381" text-anchor="middle">sk, auctionId, 200, salt) == sealedBids[id][pk] ✓</text>
  <rect x="358" y="396" width="264" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="490" y="412" text-anchor="middle">if 200 > highestBid:</text>
  <rect x="358" y="425" width="124" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="420" y="441" text-anchor="middle">highestBid = 200</text>
  <rect x="490" y="425" width="128" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="554" y="441" text-anchor="middle">winnerPK = pk</text>
</g>
<rect x="340" y="455" width="300" height="22" rx="5" fill="#0d2b1f" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="490" y="470" text-anchor="middle" style="fill:#5DCAA5">sk stays local — ZK proof submitted, not sk</text>
<rect x="40" y="510" width="600" height="50" rx="8" fill="none" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="5 3"/>
<text class="ts" x="340" y="530" text-anchor="middle" style="fill:#AFA9EC">Multi-auction architecture — single contract supports concurrent independent auctions,</text>
<text class="ts" x="340" y="548" text-anchor="middle" style="fill:#AFA9EC">each with isolated private state and independent bidCount / highestBid / winnerPK</text>
<rect x="40" y="578" width="110" height="24" rx="5" fill="#1a1035" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="95" y="594" text-anchor="middle" style="fill:#AFA9EC">Compact language</text>
<rect x="158" y="578" width="150" height="24" rx="5" fill="#1a1035" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="233" y="594" text-anchor="middle" style="fill:#AFA9EC">persistentHash (built-in)</text>
<rect x="316" y="578" width="120" height="24" rx="5" fill="#1a1035" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="376" y="594" text-anchor="middle" style="fill:#AFA9EC">1AM wallet SDK</text>
<rect x="444" y="578" width="130" height="24" rx="5" fill="#1a1035" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="509" y="594" text-anchor="middle" style="fill:#AFA9EC">AES-256-GCM client</text>
<rect x="582" y="578" width="58" height="24" rx="5" fill="#04342C" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="611" y="594" text-anchor="middle" style="fill:#5DCAA5">Mainnet ✓</text>
</svg>
