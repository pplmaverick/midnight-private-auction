<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Midnight Private Auction — Architecture Diagram v2</title>
<desc>Two-phase ZK auction flow: Bidding phase shows private state feeding ZK proof to on-chain ledger. Reveal phase shows bidder disclosing values, ZK verifying and updating highest bid.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: Inter, system-ui, sans-serif; fill: #e4e1e9; }
  .th { font-size: 14px; font-weight: 600; fill: #F8F8FF; }
  .ts { font-size: 12px; fill: #ccc3d8; }
  .c-purple rect { fill: rgba(124, 58, 237, 0.06); stroke: #534AB7; }
  .c-purple .th, .c-purple .ts { fill: #AFA9EC; }
  .c-teal rect { fill: rgba(15, 110, 86, 0.06); stroke: #0F6E56; }
  .c-teal .th, .c-teal .ts { fill: #5DCAA5; }
  .c-coral rect { fill: rgba(153, 60, 29, 0.06); stroke: #993C1D; }
  .c-coral .th, .c-coral .ts { fill: #F0997B; }
</style>
<text class="th" x="40" y="36" style="font-size:11px;letter-spacing:0.08em;opacity:0.5">BIDDING PHASE</text>
<line x1="40" y1="42" x2="640" y2="42" stroke="#2e303a" stroke-width="0.5"/>
<g class="c-purple">
  <rect x="40" y="56" width="220" height="140" rx="10" stroke-width="0.5"/>
  <text class="th" x="150" y="80" text-anchor="middle">Bidder — private state</text>
  <text class="ts" x="150" y="100" text-anchor="middle" style="opacity:0.7">Never leaves device</text>
  <rect x="60" y="112" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="128" text-anchor="middle">secretKey (sk)</text>
  <rect x="60" y="141" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="157" text-anchor="middle">bidAmount</text>
  <rect x="60" y="170" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="186" text-anchor="middle">bidSalt</text>
</g>
<line x1="262" y1="126" x2="338" y2="126" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="270" y="108" width="62" height="36" rx="6" fill="#2a1f5a" stroke="#534AB7" stroke-width="0.5"/>
<text style="font-size:12px;fill:#AFA9EC" x="301" y="124" text-anchor="middle">ZK</text>
<text style="font-size:12px;fill:#AFA9EC" x="301" y="137" text-anchor="middle">proof</text>
<g class="c-teal">
  <rect x="340" y="56" width="300" height="140" rx="10" stroke-width="0.5"/>
  <text class="th" x="490" y="80" text-anchor="middle">Midnight ledger</text>
  <text class="ts" x="490" y="100" text-anchor="middle" style="opacity:0.7">Public on-chain state</text>
  <rect x="358" y="112" width="264" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="490" y="128" text-anchor="middle">sealedBids[auctionId][bidderPK]</text>
  <rect x="358" y="141" width="264" height="40" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="490" y="157" text-anchor="middle">= persistentHash(</text>
  <text class="ts" x="490" y="172" text-anchor="middle">"auction:seal:", sk, auctionId, amt, salt)</text>
</g>
<rect x="340" y="208" width="300" height="42" rx="6" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="4 3"/>
<text style="font-size:12px;fill:#888" x="490" y="225" text-anchor="middle">Chain observers see: bidderPK + 32-byte hash</text>
<text style="font-size:12px;fill:#888" x="490" y="241" text-anchor="middle">Cannot see: amount · salt · secretKey</text>
<line x1="40" y1="270" x2="640" y2="270" stroke="#333" stroke-width="0.5" stroke-dasharray="6 4"/>
<text style="font-size:11px;letter-spacing:0.08em;opacity:0.5;font-weight:500" x="40" y="291">REVEAL PHASE  —  after closeAuction()</text>
<line x1="40" y1="297" x2="640" y2="297" stroke="#333" stroke-width="0.5"/>
<g class="c-coral">
  <rect x="40" y="312" width="220" height="100" rx="10" stroke-width="0.5"/>
  <text class="th" x="150" y="336" text-anchor="middle">Bidder discloses</text>
  <rect x="60" y="350" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="366" text-anchor="middle">amount = 200 DUST</text>
  <rect x="60" y="379" width="180" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="150" y="395" text-anchor="middle">salt = 0xabc...</text>
</g>
<line x1="262" y1="362" x2="338" y2="362" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="268" y="344" width="66" height="36" rx="6" fill="#3a1508" stroke="#993C1D" stroke-width="0.5"/>
<text style="font-size:12px;fill:#F0997B" x="301" y="360" text-anchor="middle">ZK</text>
<text style="font-size:12px;fill:#F0997B" x="301" y="373" text-anchor="middle">verify</text>
<g class="c-teal">
  <rect x="340" y="312" width="300" height="160" rx="10" stroke-width="0.5"/>
  <text class="th" x="490" y="336" text-anchor="middle">Midnight ledger verifies</text>
  <rect x="358" y="352" width="264" height="40" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="490" y="368" text-anchor="middle">assert persistentHash(sk, auctionId,</text>
  <text class="ts" x="490" y="383" text-anchor="middle">200, salt) == sealedBids[id][pk]  ✓</text>
  <rect x="358" y="398" width="264" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="490" y="414" text-anchor="middle">if 200 > highestBid:</text>
  <rect x="358" y="427" width="124" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="420" y="443" text-anchor="middle">highestBid = 200</text>
  <rect x="490" y="427" width="128" height="24" rx="5" stroke-width="0.5" style="opacity:0.3"/>
  <text class="ts" x="554" y="443" text-anchor="middle">winnerPK = pk</text>
</g>
<rect x="40" y="492" width="600" height="52" rx="8" fill="none" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="5 3"/>
<text style="font-size:12px;fill:#AFA9EC" x="340" y="513" text-anchor="middle">Multi-auction architecture — single contract supports concurrent independent auctions,</text>
<text style="font-size:12px;fill:#AFA9EC" x="340" y="531" text-anchor="middle">each with isolated private state and independent bidCount / highestBid / winnerPK</text>
<rect x="40" y="562" width="110" height="24" rx="5" fill="#1a1035" stroke="#534AB7" stroke-width="0.5"/>
<text style="font-size:12px;fill:#AFA9EC" x="95" y="578" text-anchor="middle">Compact language</text>
<rect x="158" y="562" width="150" height="24" rx="5" fill="#1a1035" stroke="#534AB7" stroke-width="0.5"/>
<text style="font-size:12px;fill:#AFA9EC" x="233" y="578" text-anchor="middle">persistentHash (built-in)</text>
<rect x="316" y="562" width="120" height="24" rx="5" fill="#1a1035" stroke="#534AB7" stroke-width="0.5"/>
<text style="font-size:12px;fill:#AFA9EC" x="376" y="578" text-anchor="middle">1AM wallet SDK</text>
<rect x="444" y="562" width="130" height="24" rx="5" fill="#1a1035" stroke="#534AB7" stroke-width="0.5"/>
<text style="font-size:12px;fill:#AFA9EC" x="509" y="578" text-anchor="middle">AES-256-GCM client</text>
<rect x="582" y="562" width="58" height="24" rx="5" fill="#04342C" stroke="#0F6E56" stroke-width="0.5"/>
<text style="font-size:12px;fill:#5DCAA5" x="611" y="578" text-anchor="middle">Mainnet ✓</text>
</svg>
